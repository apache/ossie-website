# --- Hero Section ------------------------------------------------------------
hero:
  title_line1: "Apache Ossie (incubating) is the"
  title_accent: "universal standard for semantic data"
  subtitle: >-
    Apache Ossie (incubating) is an industry-wide specification effort
    to standardize how we exchange semantic metadata across analytics, AI
    and BI platforms, providing a vendor neutral, single source of truth
    for semantic data.
  buttons:
    - text: "View Specification"
      link: "https://github.com/apache/ossie/blob/main/core-spec/spec.md"
      style: primary
      icon: github
    - text: "Get Involved"
      link: "#members"
      style: secondary
  stats:
    - value: "100%"
      label: "Vendor Neutral"
    - value: "YAML"
      label: "Configuration"
    - value: "Apache 2.0"
      label: "Open Source"
    - value: "AI Ready"
      label: "Semantic Context"

# --- Specification Showcase --------------------------------------------------
# Two-column section: feature checklist + syntax-highlighted code block.
spec_showcase:
  heading: "Write Once, "
  heading_accent: "Query Anywhere."
  description: >-
    Stop redefining "Revenue" in every dashboard. Apache Ossie uses a declarative
    YAML standard to define metrics, dimensions, and joins — so every
    tool and agent in your stack works from the same source of truth.
  code_filename: "sales_analytics.ossie.yaml"
  code: |
    <span class="ossie-yaml-key">semantic_model:</span>
      - <span class="ossie-yaml-prop">name:</span> <span class="ossie-yaml-val">ecommerce_analytics</span>
        <span class="ossie-yaml-prop">description:</span> <span class="ossie-yaml-comment">Sales and customer analytics</span>
        <span class="ossie-yaml-key">ai_context:</span>
          <span class="ossie-yaml-prop">instructions:</span> <span class="ossie-yaml-comment">"Use for sales analysis"</span>

        <span class="ossie-yaml-key">datasets:</span>
          - <span class="ossie-yaml-prop">name:</span> <span class="ossie-yaml-val">orders</span>
            <span class="ossie-yaml-prop">source:</span> <span class="ossie-yaml-val">sales.public.orders</span>
            <span class="ossie-yaml-prop">primary_key:</span> <span class="ossie-yaml-val">[order_id]</span>
            <span class="ossie-yaml-key">fields:</span>
              - <span class="ossie-yaml-prop">name:</span> <span class="ossie-yaml-val">order_date</span>
                <span class="ossie-yaml-key">dimension:</span>
                  <span class="ossie-yaml-prop">is_time:</span> <span class="ossie-yaml-val">true</span>

        <span class="ossie-yaml-key">metrics:</span>
          - <span class="ossie-yaml-prop">name:</span> <span class="ossie-yaml-val">total_revenue</span>
            <span class="ossie-yaml-key">expression:</span>
              <span class="ossie-yaml-key">dialects:</span>
                - <span class="ossie-yaml-prop">dialect:</span> <span class="ossie-yaml-val">ANSI_SQL</span>
                  <span class="ossie-yaml-prop">expression:</span> <span class="ossie-yaml-val">SUM(orders.amount)</span>
  features:
    - title: "Consistent Definitions"
      description: "Ensure Marketing, Finance, and Sales all see the same numbers — no more metric drift."
    - title: "AI-Ready Context"
      description: "Give LLMs the semantic context they need to answer business questions accurately."
    - title: "No Lock-In"
      description: "Move your business logic between platforms freely. Your metrics belong to you."

# --- About Section -----------------------------------------------------------
about:
  heading: "About Apache Ossie"
  description: >-
    Apache Ossie is a collaborative, open-source
    effort dedicated to standardizing and streamlining semantic model
    definitions across the data analytics, AI, and BI ecosystem.

  # The Challenge / Solution — two-column pitch
  challenge:
    heading: "The Challenge"
    subtitle: "Semantic Fragmentation"
    points:
      - title: "Metric Drift"
        description: "Inconsistent KPIs across different dashboards."
      - title: "Manual Translation"
        description: "Costly, error-prone reconciliation efforts."
      - title: "Hallucinations"
        description: "Unreliable AI grounding from conflicting data logic."
      - title: "Integration Debt"
        description: "Complex N-to-N custom integrations between proprietary tools."
  solution:
    heading: "The Solution"
    subtitle: "A Unified Standard"
    points:
      - title: "Single Source of Truth"
        description: "Unified semantic and metric definitions."
      - title: "Native Interoperability"
        description: "Direct exchange between platforms and AI agents."
      - title: "Trusted AI Grounding"
        description: "Agents reasoning accurately based on business logic."
      - title: "Reduced TCO"
        description: "Lower costs through automated model exchange."

  features:
    - icon: "arrows-exchange"
      title: "Interoperability"
      color: "blue"
      description: >-
        Seamlessly exchange semantic models between AI agents, BI
        platforms, and analytics tools.
    - icon: "shield-check"
      title: "Consistency"
      color: "green"
      description: >-
        Maintain consistent data definitions and values across every
        platform in your ecosystem.
    - icon: "globe-nodes"
      title: "Vendor-Agnostic"
      color: "purple"
      description: >-
        A common standard that works across all vendors, eliminating
        tool-specific inconsistencies and lock-in.
    - icon: "bolt"
      title: "Efficiency"
      color: "blue"
      description: >-
        Reduce engineering debt and accelerate innovation by using a
        unified, governed semantic foundation.

  # Core Classes — what the spec defines
  core_classes:
    heading: "Core Classes"
    description: "The Apache Ossie specification defines these building blocks:"
    classes:
      - name: "Semantic Model"
        description: "Top-level container representing a complete model with datasets, relationships, and metrics."
      - name: "Datasets"
        description: "Logical business entities — fact and dimension tables with fields and structure."
      - name: "Fields"
        description: "Row-level attributes for grouping, filtering, and metric expressions."
      - name: "Metrics"
        description: "Aggregate calculations — sums, averages, ratios — spanning multiple datasets."
      - name: "Dimensions"
        description: "Categorical attributes: Where, When, Who."
      - name: "Relationships"
        description: "Foreign key constraints connecting datasets, supporting simple and composite keys."


