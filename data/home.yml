# =============================================================================
# Landing Page Content
# =============================================================================
# This file drives all text on the home page. To change text on the landing
# page, edit these values — no HTML knowledge required. The template at
# overrides/home.html reads these values and renders them.
#
# Loaded by hooks/load_data.py which injects these values as Jinja2 globals.
# =============================================================================

# --- Hero Section ------------------------------------------------------------
# The large banner at the top of the landing page.
hero:
  title: "The Universal Standard for Semantic Model Exchange"
  subtitle: >-
    An open semantic model specification enabling semantic metadata
    interchange across analytics, AI, and BI platforms, providing a
    vendor-neutral single source of truth for your semantic data.
  buttons:
    - text: "View Specification"
      link: "#specification"
      style: primary
    - text: "Get Involved"
      link: "#get-involved"
      style: secondary

# --- About Section -----------------------------------------------------------
# Introductory paragraph and four feature cards.
about:
  heading: "About OSI"
  description: >-
    The Open Semantic Interchange (OSI) is a collaborative, open-source
    effort dedicated to standardizing and streamlining semantic model
    definitions across the data analytics, AI, and BI ecosystem.
  features:
    - icon: "🔄"
      title: "Interoperability"
      description: >-
        Seamlessly exchange semantic models between AI agents, BI
        platforms, and analytics tools.
    - icon: "✅"
      title: "Consistency"
      description: >-
        Maintain consistent data definitions and values across every
        platform in your ecosystem.
    - icon: "🌐"
      title: "Vendor-Agnostic"
      description: >-
        A common standard that works across all vendors, eliminating
        tool-specific inconsistencies and lock-in.
    - icon: "🚀"
      title: "Efficiency"
      description: >-
        Reduce engineering debt and accelerate innovation by using a
        unified, governed semantic foundation.

# --- Why OSI Section ---------------------------------------------------------
# Two-column layout: challenge on the left, solution on the right.
# Each item has a bold label and description text.
why_osi:
  heading: "Why OSI?"
  challenge:
    heading: "The Challenge (Semantic Fragmentation)"
    entries:
      - label: "Metric Drift"
        text: "Inconsistent KPIs across different dashboards."
      - label: "Manual Translation"
        text: "Costly, error-prone reconciliation efforts."
      - label: "Hallucinations"
        text: "Unreliable AI grounding from conflicting data logic."
      - label: "Integration Debt"
        text: "Complex N-to-N custom integrations between proprietary tools."
  solution:
    heading: "The Solution"
    entries:
      - label: "Single Source of Truth"
        text: "Unified semantic and metric definitions."
      - label: "Native Interoperability"
        text: "Direct exchange between platforms and AI agents."
      - label: "Trusted AI Grounding"
        text: "Agents reasoning accurately based on business logic."
      - label: "Reduced TCO"
        text: "Lower costs through automated model exchange."

