# --- Specification Section ---------------------------------------------------
# Two cards: core classes and working groups.
specification:
  heading: "Specification"
  repo_url: "https://github.com/open-semantic-interchange/OSI"
  repo_text: "View OSI Repository"
  core_classes:
    heading: "Core Classes"
    entries:
      - label: "Semantic Model"
        text: >-
          The top-level container that represents a complete semantic model,
          including datasets, relationships, and metrics.
      - label: "Data Sets"
        text: >-
          Logical datasets represent business entities or concepts (fact and
          dimension tables). They contain fields and define the structure of
          the data.
      - label: "Fields"
        text: >-
          Row-level attributes that can be used for grouping, filtering,
          and in metric expressions.
      - label: "Measures"
        text: >-
          Quantitative measures defined on business data, representing key
          calculations like sums, averages, ratios, etc. Metrics are defined
          at the semantic model level and can span multiple datasets.
      - label: "Dimensions"
        text: "Categorical attributes (Where, When, Who)."
      - label: "Relationships"
        text: >-
          Relationships define how logical datasets are connected through
          foreign key constraints. They support both simple and composite
          keys.
  working_groups:
    heading: "Current Working Groups"
    entries:
      - "Advanced Metrics & Expression Language"
      - "Composability"
      - "Catalog Integration"
      - "Ontology representation"
      - "Model converters and developer tools"

# --- Get Involved Section ----------------------------------------------------
# Call-to-action cards and the working group registration link.
get_involved:
  heading: "Get Involved"
  intro:
    heading: "How to Contribute?"
    description: >-
      Join our open-source community on GitHub. Decouple your semantic
      logic from proprietary platforms and help shape the future.
  actions:
    - text: >-
        Review the <a href="https://github.com/open-semantic-interchange/OSI"
        target="_blank">OSI repository</a> and documentation for the
        current spec.
    - text: >-
        Have a use case or an idea for the spec evolution that you would
        like to discuss with the community?
        <a href="https://github.com/open-semantic-interchange/OSI/discussions"
        target="_blank">Start a discussion here</a>.
    - text: >-
        Have a suggestion to modify the existing spec?
        <a href="https://github.com/open-semantic-interchange/OSI"
        target="_blank">Raise a Pull Request</a> in the repo.
    - text: >-
        Have tools or converters you would like to add?
        <a href="https://github.com/open-semantic-interchange/OSI"
        target="_blank">Raise a Pull Request</a> in the repo.
  join:
    heading: "Join the Working Group"
    description: >-
      Whether you are a vendor or customer, ensure your voice is heard.
    link: "https://www.snowflake.com/event/partnering-for-open-standards-join-the-open-semantic-interchange"
    link_text: "Register your interest"
