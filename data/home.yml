# --- Get Involved Section ----------------------------------------------------
# Call-to-action cards and the working group registration link.
get_involved:
  heading: "Get Involved"
  intro:
    heading: "How to Contribute?"
    description: >-
      Join our open-source community on GitHub. Decouple your semantic
      logic from proprietary platforms and help shape the future.
  actions:
    - text: >-
        Review the <a href="https://github.com/open-semantic-interchange/OSI"
        target="_blank">OSI repository</a> and documentation for the
        current spec.
    - text: >-
        Have a use case or an idea for the spec evolution that you would
        like to discuss with the community?
        <a href="https://github.com/open-semantic-interchange/OSI/discussions"
        target="_blank">Start a discussion here</a>.
    - text: >-
        Have a suggestion to modify the existing spec?
        <a href="https://github.com/open-semantic-interchange/OSI"
        target="_blank">Raise a Pull Request</a> in the repo.
    - text: >-
        Have tools or converters you would like to add?
        <a href="https://github.com/open-semantic-interchange/OSI"
        target="_blank">Raise a Pull Request</a> in the repo.
  join:
    heading: "Join the Working Group"
    description: >-
      Whether you are a vendor or customer, ensure your voice is heard.
    link: "https://www.snowflake.com/event/partnering-for-open-standards-join-the-open-semantic-interchange"
    link_text: "Register your interest"
